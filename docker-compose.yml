version: "3.9"

services:
  crispr-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crispr-target-finder
    ports:
      - "8501:8501"
    volumes:
      - user_data:/app/user_data
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: REST API service
  crispr-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crispr-api
    ports:
      - "5000:5000"
    volumes:
      - user_data:/app/user_data
    environment:
      - FLASK_ENV=production
    entrypoint: ["python", "api.py"]
    restart: unless-stopped

volumes:
  user_data:
    driver: local
